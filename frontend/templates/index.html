<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Chat App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-storage-compat.min.js"></script>
</head>
<body>
    <!-- Login Form -->
    <div class="login-container" id="login-form">
        <div class="login-box">
            <h2>Chat Login</h2>
            <form>
                <div class="input-group profile-pic-group">
                    <label for="profile-pic" class="profile-pic-container">
                        <div id="profile-pic-preview" class="profile-pic-preview">
                            <i class="fas fa-camera"></i>
                            <span id="profile-pic-label">Choose Profile Picture</span>
                        </div>
                    </label>
                    <input type="file" id="profile-pic" accept="image/*" class="hidden-file-input">
                    <small class="file-hint">Max size: 5MB. Recommended: Square image.</small>
                </div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" id="login-button">
                    <span>Login</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
                <p class="hint">New users will be automatically registered</p>
            </form>
        </div>
    </div>
    
    <!-- Chat Container (hidden initially) -->
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-header">
            <h1><i class="fas fa-comment-dots"></i> Firebase Chat</h1>
            <div class="user-info">
                <span id="current-username">Anonymous</span>
                <button id="logout-button">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
        
        <!-- Loading indicator -->
        <div id="loading-indicator" style="display: none; padding: 20px; text-align: center;">
            <div class="loading-spinner"></div>
            <p style="margin-top: 10px; color: #777;">Loading messages...</p>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be displayed here -->
        </div>
        
        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator" style="display: none;">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="chat-input">
            <textarea 
                id="message-input" 
                placeholder="Type your message... (Shift+Enter for new line)" 
                rows="1"
            ></textarea>
            <button id="send-button">
                <span>Send</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
